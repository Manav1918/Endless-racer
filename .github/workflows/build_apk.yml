name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer (Docker)
        run: |
          # Passing 'yes' ensures any other prompts (like SDK licenses) are auto-accepted
          yes | docker run --rm \
            --volume ${{ github.workspace }}:/home/buildozer/hostdir \
            kivy/buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Endless-Racer-Debug-APK
          path: bin/*.apk
