name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer (Docker)
        run: |
          # We use the official Kivy Buildozer Docker image to ensure a perfect environment.
          # We map the current workspace to /home/buildozer/hostdir inside the container.
          docker run --rm \
            --volume ${{ github.workspace }}:/home/buildozer/hostdir \
            kivy/buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Endless-Racer-Debug-APK
          path: bin/*.apk
