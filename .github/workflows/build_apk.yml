name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer (Docker)
        run: |
          # Passing 'yes' with '--interactive' ensures prompts are accepted.
          # '--env BUILDOZER_WARN_ON_ROOT=0' is the most reliable way to skip the root check.
          # '--workdir' ensures Buildozer finds the 'buildozer.spec' in the mounted folder.
          yes | docker run --interactive --rm \
            --env BUILDOZER_WARN_ON_ROOT=0 \
            --volume ${{ github.workspace }}:/home/buildozer/hostdir \
            --workdir /home/buildozer/hostdir \
            kivy/buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Endless-Racer-Debug-APK
          path: bin/*.apk
