name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses6-dev libncursesw6-dev libtinfo6 cmake libffi-dev libssl-dev libsqlite3-dev

      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade "Cython<3.0" buildozer
          echo "PATH=$PATH:$HOME/.local/bin" >> $GITHUB_ENV

      - name: Build with Buildozer
        run: |
          # The 'yes' command handles all the Android SDK/NDK license prompts
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Endless-Racer-Debug-APK
          path: bin/*.apk
